seed: 64

data:
  root: data
  train_images: train/images
  train_masks: train/masks
  val_images: val/images
  val_masks: val/masks
  input_size: 512
  num_classes: 19
  class_names:
    - background
    - skin
    - nose
    - eye_g
    - l_eye
    - r_eye
    - l_brow
    - r_brow
    - l_ear
    - r_ear
    - mouth
    - u_lip
    - l_lip
    - hair
    - hat
    - ear_r
    - neck_l
    - neck
    - cloth
  # Left/right labels that must be swapped after horizontal flip.
  flip_pairs:
    - [4, 5]   # l_eye <-> r_eye
    - [6, 7]   # l_brow <-> r_brow
    - [8, 9]   # l_ear <-> r_ear
  val_split: 0.1
  num_workers: 2
  pin_memory: true

model:
  encoder_type: mobilenetv2
  encoder_channels: [33, 64, 97, 126, 170]
  expand_ratio: 4
  use_se: false
  residual_blocks: [1, 1, 1, 1]
  decoder_type: unet
  fpn_channels: 112
  max_trainable_params: 1821085

train:
  epochs: 100
  batch_size: 10
  drop_last: true
  use_amp: true
  use_internal_val: true
  lr: 0.0003
  weight_decay: 0.0005
  min_lr: 0.000001
  save_dir: experiments/baseline

loss:
  dice_weight: 0.5
  dice_present_only: true
  ignore_index: null
  boundary:
    enabled: true
    weight: 0.05
    pos_weight: 4.0
    warmup_epochs: 8
    pred_scale: 4.0
  ce_weighting:
    enabled: true
    stats_json: experiments/mask_stats.json
    key: recommended_weighted_ce.weights
    min_weight: 0.0
    max_weight: null
    normalize_mean_one: false

augmentation:
  hflip_prob: 0.5
  rotation_deg: 15
  resize_scale: [0.8, 1.0]
  resize_ratio: [0.9, 1.1]
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.05
    prob: 0.7
  gaussian_blur:
    prob: 0.1
    sigma: [0.1, 1.5]

inference:
  batch_size: 8
  tta_flip: false
  output_dir: outputs
  output_ext: .png
