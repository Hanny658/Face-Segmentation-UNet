seed: 65

data:
  root: data
  train_images: train/images
  train_masks: train/masks
  val_images: val/images
  val_masks: val/masks
  input_size: 512
  num_classes: 19
  class_names:
    - background
    - skin
    - nose
    - eye_g
    - l_eye
    - r_eye
    - l_brow
    - r_brow
    - l_ear
    - r_ear
    - mouth
    - u_lip
    - l_lip
    - hair
    - hat
    - ear_r
    - neck_l
    - neck
    - cloth
  # Left/right labels that must be swapped after horizontal flip.
  flip_pairs:
    - [4, 5]   # l_eye <-> r_eye
    - [6, 7]   # l_brow <-> r_brow
    - [8, 9]   # l_ear <-> r_ear
  val_split: 0.05
  num_workers: 2
  pin_memory: true

model:
  encoder_type: mobilenetv2
  encoder_channels: [33, 64, 97, 126, 170]  # this settin came with margin of only 1
  expand_ratio: 4
  use_se: false
  residual_blocks: [1, 1, 1, 1]
  decoder_type: unet
  fpn_channels: 112
  max_trainable_params: 1821085 # as of specified

train:
  epochs: 100
  batch_size: 50    # just great for A40
  drop_last: true
  use_amp: true
  use_internal_val: true
  run_val_data: true
  lr: 0.002
  weight_decay: 0.0004
  min_lr: 0.000005
  save_dir: experiments/baseline

validation:
  use_tta: true # same TTA settings as inference, this is a swittttch

loss:
  dice_weight: 0.8
  dice_present_only: true
  ignore_index: null
  boundary:
    enabled: true
    weight: 0.2
    pos_weight: 4.0
    warmup_epochs: 5
    pred_scale: 4.0
  ce_weighting:
    enabled: true
    stats_json: experiments/mask_stats.json
    key: recommended_weighted_ce.weights
    min_weight: 0.1
    max_weight: 4.0
    normalize_mean_one: false

augmentation:
  hflip_prob: 0.5
  rotation_deg: 15
  resize_scale: [0.75, 1.05]
  resize_ratio: [0.9, 1.1]
  color_jitter:
    brightness: 0.25
    contrast: 0.2
    saturation: 0.2
    hue: 0.05
    prob: 0.75
  gaussian_blur:
    prob: 0.1
    sigma: [0.1, 1.5]

inference:
  batch_size: 20
  tta_enabled: true # TURN ALL THE LIGHTS ON!
  tta_flip: true
  tta_scales: [0.75, 1.0, 1.25]
  output_dir: outputs
  output_ext: .png
